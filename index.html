<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Neon Racer 高空賽道版</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a1020;
    color: #fff;
    font-family: Arial, "Microsoft JhengHei", sans-serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
    background: linear-gradient(#97d5ff 0%, #f7b6a7 46%, #5f6a9a 100%);
  }
  #hud {
    position: fixed;
    top: max(10px, env(safe-area-inset-top));
    left: max(10px, env(safe-area-inset-left));
    z-index: 10;
    min-width: 172px;
    padding: 10px 12px;
    border-radius: 14px;
    background: rgba(0,0,0,0.40);
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(8px);
    box-shadow: 0 0 16px rgba(0,0,0,0.18);
    font-size: 13px;
    line-height: 1.5;
  }
  .title {
    font-weight: 900;
    color: #00e6ff;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  #hint {
    position: fixed;
    left: max(10px, env(safe-area-inset-left));
    bottom: calc(22px + env(safe-area-inset-bottom));
    z-index: 10;
    padding: 10px 12px;
    border-radius: 14px;
    background: rgba(0,0,0,0.28);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.94);
    font-size: 12px;
    line-height: 1.45;
    max-width: 185px;
  }
  #controls {
    position: fixed;
    right: max(14px, env(safe-area-inset-right));
    bottom: calc(18px + env(safe-area-inset-bottom));
    z-index: 12;
    display: grid;
    grid-template-columns: 88px;
    grid-template-rows: 66px 86px;
    gap: 10px;
  }
  .btn {
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 18px;
    color: #fff;
    font-weight: 900;
    font-size: 18px;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    box-shadow: 0 0 16px rgba(0,0,0,0.18);
    -webkit-tap-highlight-color: transparent;
  }
  .btn.active, .btn:active {
    transform: scale(0.96);
    filter: brightness(1.08);
  }
  #brake { background: rgba(200, 60, 60, 0.44); }
  #gas   { background: rgba(0, 180, 140, 0.44); font-size: 20px; }
  #start {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    background: radial-gradient(circle at center, rgba(255,255,255,0.12), rgba(0,0,0,0.84));
  }
  #start h1 {
    margin: 0;
    font-size: clamp(40px, 9vw, 84px);
    color: #00e6ff;
    text-shadow: 0 0 24px rgba(0,230,255,0.7);
    letter-spacing: 2px;
  }
  #start h2 {
    margin: 12px 0 8px;
    font-size: clamp(20px, 4vw, 32px);
  }
  #start p {
    max-width: 700px;
    line-height: 1.6;
    color: #e6f6ff;
  }
  #startBtn, #restartBtn {
    border: 0;
    border-radius: 999px;
    padding: 16px 42px;
    font-size: 24px;
    font-weight: 900;
    color: #09121d;
    background: #00e6ff;
    box-shadow: 0 0 28px rgba(0,230,255,0.62);
    margin-top: 10px;
  }
  #resultBox { display: none; margin-top: 10px; }
  .small { font-size: 13px; color: rgba(255,255,255,0.8); }
  @media (orientation: portrait) and (max-width: 900px) {
    #start::after {
      content: "建議手機橫向遊玩，視角與按鈕會更舒服";
      position: absolute;
      bottom: 22px;
      color: rgba(255,255,255,0.82);
      font-size: 13px;
    }
    #controls {
      grid-template-columns: 82px;
      grid-template-rows: 62px 82px;
    }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div class="title">高空賽道版</div>
  <div>速度：<span id="speed">0</span> km/h</div>
  <div>里程：<span id="distance">0</span> m</div>
  <div>關卡：<span id="stage">1</span></div>
  <div>排名：<span id="rank">1</span> / 3</div>
  <div>狀態：<span id="stateText">待機</span></div>
</div>

<div id="hint">
  左半邊畫面左右滑動可轉向<br>
  右下只保留：<b>煞車</b>、<b>加速</b><br>
  高空長賽道 + 關卡式坡道
</div>

<div id="controls">
  <button class="btn" id="brake">煞車</button>
  <button class="btn" id="gas">加速</button>
</div>

<div id="start">
  <h1>NEON RACER</h1>
  <h2>高空賽道・關卡彎道・坡道版</h2>
  <p>
    這版已加上更像參考圖的<b>高空懸浮賽道</b>、<b>更長的路線</b>、
    <b>關卡式彎道</b>與<b>連續坡道起伏</b>。視角維持後方追尾，
    操作簡化成<b>啟動</b>、<b>煞車</b>、<b>加速</b>。
  </p>
  <button id="startBtn">啟動</button>
  <div id="resultBox">
    <p id="resultText"></p>
    <button id="restartBtn">再玩一次</button>
  </div>
  <p class="small">電腦可使用：方向鍵左右轉向、上加速、下煞車</p>
</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const speedEl = document.getElementById("speed");
  const distanceEl = document.getElementById("distance");
  const rankEl = document.getElementById("rank");
  const stageEl = document.getElementById("stage");
  const stateTextEl = document.getElementById("stateText");
  const startOverlay = document.getElementById("start");
  const startBtn = document.getElementById("startBtn");
  const resultBox = document.getElementById("resultBox");
  const resultText = document.getElementById("resultText");
  const restartBtn = document.getElementById("restartBtn");
  const gasBtn = document.getElementById("gas");
  const brakeBtn = document.getElementById("brake");

  let W = 0, H = 0, DPR = 1;
  let running = false;
  let lastTime = 0;

  const keys = new Set();
  const touch = { gas: false, brake: false, steer: 0 };

  const segmentLength = 200;
  const roadWidth = 1600;
  const cameraHeight = 920;
  const drawDistance = 240;
  const fieldOfView = 92;
  const cameraDepth = 1 / Math.tan((fieldOfView / 2) * Math.PI / 180);
  const playerZ = cameraHeight * cameraDepth;
  const maxSpeed = 12000;
  const accel = 2200;
  const braking = -4200;
  const decel = -800;
  const offRoadDecel = -2600;
  const offRoadLimit = 2800;
  const centrifugal = 0.26;

  const COLORS = {
    ROAD: '#9a9aa0',
    ROAD_ALT: '#919197',
    LANE: '#d8d8dc',
    EDGE_A: '#f4d000',
    EDGE_B: '#202020',
    GUARD: '#aab7d0',
    SIDE: '#7d7d84',
    VOID: '#dde7fb'
  };

  const segments = [];
  let trackLength = 0;

  const player = {
    x: 0,
    z: 0,
    speed: 0,
    totalDistance: 0
  };

  const rivals = [
    { z: 1800, x: -0.22, speed: 7600, color: '#66ff5e', name: '綠車' },
    { z: 4200, x:  0.24, speed: 7100, color: '#ff60d2', name: '粉車' }
  ];

  const stages = [];

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }
  function easeIn(a, b, percent) {
    return a + (b - a) * Math.pow(percent, 2);
  }
  function easeInOut(a, b, percent) {
    return a + (b - a) * ((-Math.cos(percent * Math.PI) / 2) + 0.5);
  }
  function percentRemaining(n, total) {
    return (n % total) / total;
  }
  function accelerate(v, accelValue, dt) {
    return v + (accelValue * dt);
  }
  function increase(start, increment, max) {
    let result = start + increment;
    while (result >= max) result -= max;
    while (result < 0) result += max;
    return result;
  }
  function interpolate(a, b, percent) {
    return a + (b - a) * percent;
  }

  function addSegment(curve, y) {
    const n = segments.length;
    segments.push({
      index: n,
      p1: { world: { x: 0, y: lastY(), z: n * segmentLength }, camera: {}, screen: {} },
      p2: { world: { x: 0, y: y, z: (n + 1) * segmentLength }, camera: {}, screen: {} },
      curve
    });
  }

  function lastY() {
    return (segments.length === 0) ? 0 : segments[segments.length - 1].p2.world.y;
  }

  function addRoad(enter, hold, leave, curve, y) {
    const startY = lastY();
    const endY = startY + (y * segmentLength);
    const total = enter + hold + leave;
    for (let n = 0; n < enter; n++) {
      addSegment(easeIn(0, curve, n / enter), easeInOut(startY, endY, n / total));
    }
    for (let n = 0; n < hold; n++) {
      addSegment(curve, easeInOut(startY, endY, (enter + n) / total));
    }
    for (let n = 0; n < leave; n++) {
      addSegment(easeInOut(curve, 0, n / leave), easeInOut(startY, endY, (enter + hold + n) / total));
    }
  }

  function stage(startSegment, lengthSegments, name) {
    stages.push({ start: startSegment * segmentLength, end: (startSegment + lengthSegments) * segmentLength, name });
  }

  function buildTrack() {
    segments.length = 0;
    stages.length = 0;

    let s0 = segments.length; // Stage 1
    addRoad(20, 70, 20, 0.0, 0);
    addRoad(20, 60, 20, 0.38, 6);
    addRoad(20, 55, 20, -0.55, -4);
    stage(s0, segments.length - s0, '1');

    let s1 = segments.length; // Stage 2
    addRoad(25, 85, 25, 0.82, 10);
    addRoad(20, 50, 20, -0.2, 4);
    addRoad(20, 70, 20, -0.92, -9);
    stage(s1, segments.length - s1, '2');

    let s2 = segments.length; // Stage 3
    addRoad(20, 55, 20, 0.0, 12);
    addRoad(18, 42, 18, 0.68, -5);
    addRoad(18, 42, 18, -0.68, 5);
    addRoad(20, 50, 20, 0.0, -8);
    stage(s2, segments.length - s2, '3');

    let s3 = segments.length; // Stage 4
    addRoad(25, 95, 25, 1.05, 14);
    addRoad(18, 45, 18, -0.48, -4);
    addRoad(25, 95, 25, -1.05, -12);
    stage(s3, segments.length - s3, '4');

    let s4 = segments.length; // Stage 5
    addRoad(20, 60, 20, 0.0, 18);
    addRoad(20, 75, 20, 0.48, -10);
    addRoad(20, 75, 20, -0.48, 10);
    addRoad(20, 75, 20, 0.0, -12);
    stage(s4, segments.length - s4, '5');

    trackLength = segments.length * segmentLength;
  }

  function findSegment(z) {
    return segments[Math.floor(z / segmentLength) % segments.length];
  }

  function project(p, cameraX, cameraY, cameraZ) {
    const dz = p.world.z - cameraZ;
    const dx = p.world.x - cameraX;
    const dy = p.world.y - cameraY;

    p.camera.x = dx;
    p.camera.y = dy;
    p.camera.z = dz;

    p.screen.scale = cameraDepth / dz;
    p.screen.x = Math.round((1 + p.screen.scale * dx / roadWidth) * W / 2);
    p.screen.y = Math.round((1 - p.screen.scale * dy) * H / 2);
    p.screen.w = Math.round((p.screen.scale * roadWidth * W) / 2);
  }

  function drawPolygon(x1, y1, x2, y2, x3, y3, x4, y4, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.lineTo(x3, y3);
    ctx.lineTo(x4, y4);
    ctx.closePath();
    ctx.fill();
  }

  function drawQuad(x1, y1, w1, x2, y2, w2, color) {
    drawPolygon(x1 - w1, y1, x1 + w1, y1, x2 + w2, y2, x2 - w2, y2, color);
  }

  function drawSky() {
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#97d5ff');
    sky.addColorStop(0.46, '#f7b6a7');
    sky.addColorStop(1, '#5f6a9a');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    for (let i = 0; i < 10; i++) {
      const x = (i * 180 + 40 + Math.sin(i * 2 + performance.now() * 0.00003) * 12) % (W + 220) - 110;
      const y = 55 + (i % 4) * 40;
      drawCloud(x, y, 0.8 + (i % 3) * 0.25);
    }
  }

  function drawCloud(x, y, s) {
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = "#ffffff";
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.arc(x + i * 28 * s, y + ((i % 2) ? 8 : 0), 22 * s, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawFarBackground() {
    ctx.save();
    ctx.globalAlpha = 0.28;
    ctx.fillStyle = '#84759c';
    ctx.beginPath();
    ctx.moveTo(0, H * 0.42);
    for (let x = 0; x <= W + 60; x += 60) {
      const y = H * 0.42 + Math.sin(x * 0.015) * 18 + Math.cos(x * 0.007) * 12;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H * 0.62);
    ctx.lineTo(0, H * 0.62);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawRoadSegment(seg, x1, y1, w1, x2, y2, w2) {
    const stripeColor = (Math.floor(seg.index / 3) % 2 === 0) ? COLORS.EDGE_A : COLORS.EDGE_B;
    const roadColor = (Math.floor(seg.index / 3) % 2 === 0) ? COLORS.ROAD : COLORS.ROAD_ALT;

    // underside / floating platform shadow
    drawPolygon(x1 - w1 * 1.10, y1 + 4, x1 + w1 * 1.10, y1 + 4, x2 + w2 * 1.10, y2 + 4, x2 - w2 * 1.10, y2 + 4, 'rgba(0,0,0,0.10)');
    drawPolygon(x1 - w1 * 0.92, y1 + 18, x1 + w1 * 0.92, y1 + 18, x2 + w2 * 0.92, y2 + 18, x2 - w2 * 0.92, y2 + 18, '#7a7f91');

    // outer safety base
    drawQuad(x1, y1, w1 * 1.18, x2, y2, w2 * 1.18, COLORS.GUARD);

    // black/yellow high-altitude border
    drawQuad(x1, y1, w1 * 1.10, x2, y2, w2 * 1.10, stripeColor);

    // road shoulder
    drawQuad(x1, y1, w1 * 1.02, x2, y2, w2 * 1.02, COLORS.SIDE);

    // asphalt
    drawQuad(x1, y1, w1, x2, y2, w2, roadColor);

    // center lane
    drawQuad(x1, y1, w1 * 0.02, x2, y2, w2 * 0.02, COLORS.LANE);
  }

  function drawRivalCar(x, y, scale, color) {
    const w = 95 * scale;
    const h = 155 * scale;

    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = "rgba(0,0,0,0.18)";
    ctx.beginPath();
    ctx.ellipse(0, h * 0.44, w * 0.44, h * 0.15, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = color;
    roundRect(-w * 0.48, -h * 0.45, w * 0.96, h * 0.90, 10 * scale);
    ctx.fill();

    ctx.fillStyle = "#262a3a";
    roundRect(-w * 0.26, -h * 0.34, w * 0.52, h * 0.36, 6 * scale);
    ctx.fill();

    ctx.fillStyle = "#111";
    ctx.fillRect(-w * 0.40, -h * 0.22, w * 0.16, h * 0.10);
    ctx.fillRect( w * 0.24, -h * 0.22, w * 0.16, h * 0.10);
    ctx.fillRect(-w * 0.40,  h * 0.16, w * 0.16, h * 0.10);
    ctx.fillRect( w * 0.24,  h * 0.16, w * 0.16, h * 0.10);

    ctx.fillStyle = "#ff5148";
    ctx.fillRect(-w * 0.24, h * 0.12, w * 0.17, h * 0.08);
    ctx.fillRect( w * 0.07, h * 0.12, w * 0.17, h * 0.08);

    ctx.restore();
  }

  function drawPlayerCar() {
    const cx = W / 2 + player.x * W * 0.18;
    const cy = H * 0.80;
    const w = Math.min(W * 0.38, 270);
    const h = w * 0.90;

    ctx.save();
    ctx.translate(cx, cy);

    if (touch.gas || keys.has("ArrowUp")) {
      ctx.save();
      ctx.globalAlpha = 0.92;
      ctx.fillStyle = "#ffb800";
      flame(-w * 0.22, h * 0.32, w * 0.11, h * 0.30);
      flame( w * 0.22, h * 0.32, w * 0.11, h * 0.30);
      ctx.restore();
    }

    ctx.fillStyle = "rgba(0,0,0,0.22)";
    ctx.beginPath();
    ctx.ellipse(0, h * 0.34, w * 0.42, h * 0.11, 0, 0, Math.PI * 2);
    ctx.fill();

    const body = ctx.createLinearGradient(-w / 2, 0, w / 2, 0);
    body.addColorStop(0, "#19b9ff");
    body.addColorStop(0.5, "#50e3ff");
    body.addColorStop(1, "#178dd8");
    ctx.fillStyle = body;
    roundRect(-w * 0.48, -h * 0.20, w * 0.96, h * 0.54, 22);
    ctx.fill();

    ctx.fillStyle = "#21bfff";
    roundRect(-w * 0.28, -h * 0.42, w * 0.56, h * 0.28, 16);
    ctx.fill();

    ctx.fillStyle = "#111421";
    roundRect(-w * 0.24, -h * 0.38, w * 0.48, h * 0.18, 12);
    ctx.fill();

    ctx.fillStyle = "#0f1115";
    ctx.fillRect(-w * 0.47, h * 0.02, w * 0.13, h * 0.14);
    ctx.fillRect( w * 0.34, h * 0.02, w * 0.13, h * 0.14);

    ctx.fillStyle = "#ff3c34";
    roundRect(-w * 0.40, -h * 0.04, w * 0.21, h * 0.08, 8);
    ctx.fill();
    roundRect( w * 0.19, -h * 0.04, w * 0.21, h * 0.08, 8);
    ctx.fill();

    ctx.fillStyle = "#d4f8ff";
    ctx.fillRect(-w * 0.15, h * 0.00, w * 0.30, h * 0.028);

    ctx.fillStyle = "#0a0b0d";
    ctx.fillRect(-w * 0.46, h * 0.22, w * 0.92, h * 0.10);

    ctx.fillStyle = "#f0f0f0";
    roundRect(-w * 0.66, -h * 0.16, w * 0.12, h * 0.07, 8);
    ctx.fill();
    roundRect( w * 0.54, -h * 0.16, w * 0.12, h * 0.07, 8);
    ctx.fill();

    ctx.restore();
  }

  function flame(x, y, w, h) {
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.quadraticCurveTo(x - w * 0.5, y + h * 0.4, x - w * 0.15, y + h);
    ctx.quadraticCurveTo(x, y + h * 0.82, x + w * 0.15, y + h);
    ctx.quadraticCurveTo(x + w * 0.5, y + h * 0.4, x, y);
    ctx.fill();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function updateStageDisplay() {
    const d = player.totalDistance;
    for (let i = 0; i < stages.length; i++) {
      if (d >= stages[i].start && d < stages[i].end) {
        stageEl.textContent = stages[i].name;
        return;
      }
    }
    stageEl.textContent = '5';
  }

  function update(dt) {
    const accelInput = touch.gas || keys.has("ArrowUp");
    const brakeInput = touch.brake || keys.has("ArrowDown");
    const steerInput = clamp(touch.steer + (keys.has("ArrowLeft") ? -1 : 0) + (keys.has("ArrowRight") ? 1 : 0), -1, 1);

    if (accelInput) {
      player.speed = accelerate(player.speed, accel, dt);
      stateTextEl.textContent = "加速中";
    } else if (brakeInput) {
      player.speed = accelerate(player.speed, braking, dt);
      stateTextEl.textContent = "煞車中";
    } else {
      player.speed = accelerate(player.speed, decel, dt);
      stateTextEl.textContent = "巡航中";
    }

    const playerSegment = findSegment(player.z + playerZ);
    const speedPercent = player.speed / maxSpeed;
    const dx = dt * 2 * speedPercent;

    player.x -= dx * steerInput;
    player.x -= dx * speedPercent * playerSegment.curve * centrifugal;
    player.x = clamp(player.x, -1.32, 1.32);

    if ((player.x < -1 || player.x > 1) && player.speed > offRoadLimit) {
      player.speed = accelerate(player.speed, offRoadDecel, dt);
      stateTextEl.textContent = "貼邊減速";
    }

    player.z = increase(player.z, dt * player.speed, trackLength);
    player.totalDistance += dt * player.speed;

    for (const car of rivals) {
      car.z = increase(car.z, dt * car.speed, trackLength);
      const dz = Math.abs(car.z - player.z);
      const close = Math.min(dz, trackLength - dz);

      if (close < 1800) {
        car.x += (car.x < player.x ? -0.10 : 0.10) * dt;
        car.x = clamp(car.x, -0.75, 0.75);
      } else {
        car.x += Math.sin(performance.now() * 0.0004 + car.z * 0.001) * 0.002;
        car.x = clamp(car.x, -0.65, 0.65);
      }
    }

    for (const car of rivals) {
      const dz = Math.abs(car.z - player.z);
      const wrappedDz = Math.min(dz, trackLength - dz);
      if (wrappedDz < 170 && Math.abs(car.x - player.x) < 0.22) {
        player.speed *= 0.72;
        stateTextEl.textContent = "撞到前車";
      }
    }

    player.speed = clamp(player.speed, 0, maxSpeed);
    updateStageDisplay();
  }

  function render() {
    drawSky();
    drawFarBackground();

    const baseSegment = findSegment(player.z);
    const basePercent = percentRemaining(player.z, segmentLength);
    const playerSegment = findSegment(player.z + playerZ);
    const playerPercent = percentRemaining(player.z + playerZ, segmentLength);
    const playerY = interpolate(playerSegment.p1.world.y, playerSegment.p2.world.y, playerPercent) + cameraHeight;

    let x = 0;
    let dx = -(baseSegment.curve * basePercent);
    let maxy = H;

    const visibleCars = [];

    for (let n = 0; n < drawDistance; n++) {
      const segment = segments[(baseSegment.index + n) % segments.length];
      segment.looped = segment.index < baseSegment.index;

      project(segment.p1, (player.x * roadWidth) - x, playerY, player.z - (segment.looped ? trackLength : 0));
      project(segment.p2, (player.x * roadWidth) - x - dx, playerY, player.z - (segment.looped ? trackLength : 0));

      x += dx;
      dx += segment.curve;

      if (segment.p1.camera.z <= cameraDepth ||
          segment.p2.screen.y >= segment.p1.screen.y ||
          segment.p2.screen.y >= maxy) {
        continue;
      }

      drawRoadSegment(segment,
        segment.p1.screen.x, segment.p1.screen.y, segment.p1.screen.w,
        segment.p2.screen.x, segment.p2.screen.y, segment.p2.screen.w
      );

      maxy = segment.p2.screen.y;

      for (const car of rivals) {
        let carZ = car.z;
        if (segment.looped && carZ < baseSegment.index * segmentLength) carZ += trackLength;
        if (carZ >= segment.p1.world.z && carZ < segment.p2.world.z) {
          const percent = percentRemaining(carZ, segmentLength);
          const scale = interpolate(segment.p1.screen.scale, segment.p2.screen.scale, percent);
          const screenX = interpolate(segment.p1.screen.x, segment.p2.screen.x, percent) + (scale * car.x * roadWidth * W / 2);
          const screenY = interpolate(segment.p1.screen.y, segment.p2.screen.y, percent);
          visibleCars.push({ x: screenX, y: screenY, scale: scale * 1.15, color: car.color });
        }
      }
    }

    visibleCars.sort((a, b) => a.scale - b.scale);
    for (const car of visibleCars) {
      if (car.scale > 0.02) drawRivalCar(car.x, car.y, car.scale, car.color);
    }

    drawPlayerCar();
  }

  function updateHUD() {
    const distances = [
      { label: "你", progress: player.totalDistance },
      ...rivals.map(car => {
        let d = car.z - player.z;
        if (d < -trackLength / 2) d += trackLength;
        if (d >  trackLength / 2) d -= trackLength;
        return { label: car.name, progress: player.totalDistance + d };
      })
    ];

    const sorted = distances.slice().sort((a, b) => b.progress - a.progress);
    const rank = sorted.findIndex(item => item.label === "你") + 1;

    speedEl.textContent = Math.round((player.speed / maxSpeed) * 330);
    distanceEl.textContent = Math.round(player.totalDistance / 4);
    rankEl.textContent = rank;
  }

  function frame(time) {
    if (!lastTime) lastTime = time;
    let dt = Math.min((time - lastTime) / 1000, 0.05);
    while (dt > 1 / 60) {
      if (running) update(1 / 60);
      dt -= 1 / 60;
    }
    lastTime = time;

    render();
    updateHUD();
    requestAnimationFrame(frame);
  }

  function startGame() {
    running = true;
    player.x = 0;
    player.z = 0;
    player.speed = 0;
    player.totalDistance = 0;
    stageEl.textContent = '1';
    rivals[0].z = 1800; rivals[0].x = -0.22;
    rivals[1].z = 4200; rivals[1].x = 0.24;
    startOverlay.style.display = 'none';
    resultBox.style.display = 'none';
    startBtn.style.display = 'inline-block';
  }

  function bindButton(btn, key) {
    const set = (value) => {
      touch[key] = value;
      btn.classList.toggle("active", value);
    };
    ["pointerdown", "touchstart"].forEach(type => {
      btn.addEventListener(type, e => {
        e.preventDefault();
        set(true);
      }, { passive: false });
    });
    ["pointerup", "pointerleave", "pointercancel", "touchend", "touchcancel"].forEach(type => {
      btn.addEventListener(type, e => {
        e.preventDefault();
        set(false);
      }, { passive: false });
    });
  }

  function setupSteering() {
    let activeId = null;

    function updateSteer(clientX) {
      const region = W * 0.55;
      const center = region * 0.5;
      touch.steer = clamp((clientX - center) / center, -1, 1);
    }

    canvas.addEventListener("pointerdown", e => {
      if (e.clientX > W * 0.60) return;
      activeId = e.pointerId;
      canvas.setPointerCapture(e.pointerId);
      updateSteer(e.clientX);
    });
    canvas.addEventListener("pointermove", e => {
      if (e.pointerId !== activeId) return;
      updateSteer(e.clientX);
    });
    function clearSteer(e) {
      if (e.pointerId !== activeId) return;
      activeId = null;
      touch.steer = 0;
    }
    canvas.addEventListener("pointerup", clearSteer);
    canvas.addEventListener("pointercancel", clearSteer);
  }

  function checkFinish() {
    if (running && player.totalDistance > 76000) {
      running = false;
      startOverlay.style.display = 'flex';
      startBtn.style.display = 'none';
      resultBox.style.display = 'block';
      resultText.textContent = `完成高空關卡賽道！你的里程：${Math.round(player.totalDistance / 4)} m`;
    }
    requestAnimationFrame(checkFinish);
  }

  window.addEventListener("keydown", e => {
    keys.add(e.code);
    if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Space"].includes(e.code)) e.preventDefault();
  });
  window.addEventListener("keyup", e => keys.delete(e.code));
  window.addEventListener("resize", resize);

  startBtn.addEventListener("click", startGame);
  restartBtn.addEventListener("click", startGame);

  bindButton(gasBtn, "gas");
  bindButton(brakeBtn, "brake");
  setupSteering();

  resize();
  buildTrack();
  render();
  updateHUD();
  requestAnimationFrame(frame);
  requestAnimationFrame(checkFinish);
})();
</script>
</body>
</html>
