<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Neon Racer City Chase V12</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <div id="orientationHint">建議橫向遊玩，視角與按鈕體驗更好</div>

  <div id="topLeftPanel" class="glass">
    <div class="settingRow"><span>GRIP</span><b>ON</b></div>
    <div class="settingRow"><span>ABS</span><b>ON</b></div>
    <div class="settingRow"><span>ESP</span><b>ON</b></div>
  </div>

  <div id="hud" class="glass">
    <div class="logo">CITY CHASE V12</div>
    <div>速度：<span id="speed">0</span> km/h</div>
    <div>里程：<span id="distance">0</span> m</div>
    <div>排名：<span id="rank">1</span> / 4</div>
    <div>狀態：<span id="stateText">待機</span></div>
  </div>

  <div id="speedometer" class="glassLite">
    <canvas id="meter" width="170" height="170"></canvas>
  </div>

  <div id="cornerTools">
    <button id="fullscreenBtn" class="toolBtn" aria-label="全螢幕">⛶</button>
  </div>

  <div id="controls">
    <div id="leftControls">
      <button class="roundBtn" id="leftBtn" aria-label="左轉">◀</button>
      <button class="roundBtn" id="rightBtn" aria-label="右轉">▶</button>
    </div>

    <div id="rightControls">
      <button class="pedalBtn brake" id="brakeBtn" aria-label="煞車">煞車</button>
      <button class="pedalBtn gas" id="gasBtn" aria-label="加速">加速</button>
    </div>
  </div>

  <div id="start">
    <div class="startPanel">
      <h1>NEON RACER</h1>
      <h2>V12 城市追車視角強化版</h2>
      <p>
        已強化：<b>追尾視角</b>、<b>速度感與鏡頭震動</b>、<b>火焰與車身傾斜</b>、<b>城市夜景與路燈光暈</b>、<b>手機控制與全螢幕體驗</b>。
      </p>
      <div class="startActions">
        <button id="startBtn">啟動遊戲</button>
        <button id="fullscreenStartBtn" class="secondaryBtn">全螢幕</button>
      </div>
      <p class="small">手機建議橫向｜電腦可用方向鍵操作</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
