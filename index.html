<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Neon Racer Stable Mobile</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#02040a;color:white;font-family:Arial,"Microsoft JhengHei",sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{position:fixed;inset:0;width:100vw;height:100vh;display:block;background:#02040a}
#start{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:radial-gradient(circle,rgba(0,234,255,.18),rgba(0,0,0,.92)),#02040a}
#start h1{margin:0;color:#00eaff;font-size:clamp(38px,8vw,78px);letter-spacing:3px;text-shadow:0 0 28px #00eaff}
#start p{line-height:1.6;color:#dffcff;padding:0 22px;max-width:600px}
#startBtn{border:0;border-radius:999px;padding:16px 38px;background:#00eaff;color:#001018;font-size:22px;font-weight:900;box-shadow:0 0 26px #00eaff}
#hud{position:fixed;top:max(8px,env(safe-area-inset-top));left:max(8px,env(safe-area-inset-left));z-index:5;min-width:150px;padding:8px 10px;background:rgba(0,0,0,.48);border:1px solid rgba(0,234,255,.68);border-radius:13px;box-shadow:0 0 18px rgba(0,234,255,.3);font-size:12px;line-height:1.45}
.logo{color:#00eaff;font-weight:900}
#leader{position:fixed;top:max(8px,env(safe-area-inset-top));right:max(8px,env(safe-area-inset-right));z-index:5;width:132px;padding:8px;background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.22);border-radius:13px;font-size:10px;line-height:1.35}
.row{display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08);gap:6px}
.me{color:#00eaff}
#nitroBox{height:10px;margin-top:6px;border:1px solid #00eaff;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.08)}
#nitro{height:100%;width:100%;background:linear-gradient(90deg,#00eaff,#7a5cff,#ff3ee8)}
#controls{position:fixed;left:0;right:0;bottom:calc(16px + env(safe-area-inset-bottom));z-index:10;display:flex;justify-content:space-between;align-items:flex-end;padding:0 18px;pointer-events:none}
#steer{width:118px;height:118px;border-radius:50%;border:1px solid rgba(0,234,255,.75);background:radial-gradient(circle,rgba(0,234,255,.14),rgba(0,0,0,.48));box-shadow:0 0 20px rgba(0,234,255,.34);position:relative;pointer-events:auto}
#knob{position:absolute;left:50%;top:50%;width:50px;height:50px;margin-left:-25px;margin-top:-25px;border-radius:50%;background:rgba(0,234,255,.28);border:1px solid rgba(255,255,255,.55);box-shadow:0 0 18px rgba(0,234,255,.55)}
#steer span{position:absolute;left:0;right:0;bottom:12px;text-align:center;font-size:10px;color:rgba(255,255,255,.55)}
.right{display:grid;grid-template-columns:58px 78px;grid-template-rows:56px 82px;gap:8px;pointer-events:auto}
.btn{border-radius:50%;border:1px solid rgba(0,234,255,.85);background:rgba(0,12,24,.58);color:#eaffff;font-size:11px;font-weight:900;box-shadow:0 0 16px rgba(0,234,255,.32)}
.btn.active,.btn:active{transform:scale(.94);background:rgba(0,234,255,.28)}
#brake{width:56px;height:56px}
#drift,#boost{width:64px;height:64px}
#gas{width:80px;height:80px;border-color:rgba(0,255,170,.9);box-shadow:0 0 16px rgba(0,255,170,.32)}
#boost{border-color:rgba(255,62,232,.9);box-shadow:0 0 16px rgba(255,62,232,.32)}
#drift{border-color:rgba(255,196,0,.9);box-shadow:0 0 16px rgba(255,196,0,.28)}
@media(orientation:portrait) and (max-width:900px){#start:after{content:"建議手機橫向遊玩";position:absolute;bottom:22px;color:rgba(255,255,255,.72);font-size:13px}}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div class="logo">STABLE 單檔版</div>
  <div>圈數：<span id="lap">1</span>/3</div>
  <div>排名：<span id="rank">1</span>/6</div>
  <div>速度：<span id="speed">0</span></div>
  <div>漂移：<span id="score">0</span></div>
  <div id="nitroBox"><div id="nitro"></div></div>
</div>

<div id="leader"></div>

<div id="controls">
  <div id="steer"><div id="knob"></div><span>STEER</span></div>
  <div class="right">
    <button class="btn" id="brake">BRAKE</button>
    <button class="btn" id="drift">DRIFT</button>
    <button class="btn" id="boost">NITRO</button>
    <button class="btn" id="gas">GAS</button>
  </div>
</div>

<div id="start">
  <h1>NEON RACER</h1>
  <p>STABLE 單檔可玩版。沒有 Three.js、沒有 Rapier、沒有 GLTF、沒有 assets 資料夾。只要這一個 index.html 就能跑。</p>
  <button id="startBtn">開始比賽</button>
  <p style="font-size:13px;color:rgba(255,255,255,.7)">手機：左下方向盤，右下油門 / 煞車 / 氮氣 / 漂移</p>
</div>

<script>
(()=>{
const canvas=document.getElementById("game"),ctx=canvas.getContext("2d");
const start=document.getElementById("start"),startBtn=document.getElementById("startBtn");
const lapEl=document.getElementById("lap"),rankEl=document.getElementById("rank"),speedEl=document.getElementById("speed"),scoreEl=document.getElementById("score"),nitroEl=document.getElementById("nitro"),leader=document.getElementById("leader");
const steer=document.getElementById("steer"),knob=document.getElementById("knob");
const gas=document.getElementById("gas"),brake=document.getElementById("brake"),boost=document.getElementById("boost"),driftBtn=document.getElementById("drift");
let W=0,H=0,DPR=1,last=0,running=false;
const keys=new Set(),touch={gas:false,brake:false,nitro:false,drift:false,steer:0};
const world={cx:600,cy:380,outerRx:500,outerRy:285,innerRx:285,innerRy:125};
const cps=[{x:600,y:92},{x:1065,y:380},{x:600,y:668},{x:135,y:380}];
const starts=[[600,128],[552,128],[648,128],[504,158],[696,158],[600,188]];
const specs=[
["你","#00eaff","🏎️","玩家",1,1],["Tiger","#ff4b2b","🐯","攻擊",1.25,.55],["Turtle","#5dff86","🐢","保守",.55,1.35],
["Eagle","#f6ff5d","🦅","抓線",.9,.9],["Fox","#ff4fd8","🦊","假動作",.95,.8],["Bull","#b16bff","🦬","硬擠",1.45,.45]
];
let cars=[],player,smoke=[],skids=[];
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0)}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function onRoad(x,y){return ((x-world.cx)**2)/(world.outerRx**2)+((y-world.cy)**2)/(world.outerRy**2)<=1&&((x-world.cx)**2)/(world.innerRx**2)+((y-world.cy)**2)/(world.innerRy**2)>=1}
function centerAng(x,y){return Math.atan2((y-world.cy)/world.outerRy,(x-world.cx)/world.outerRx)}
function centerPoint(a){return{x:world.cx+Math.cos(a)*(world.outerRx+world.innerRx)/2,y:world.cy+Math.sin(a)*(world.outerRy+world.innerRy)/2}}
function fwd(a){return{x:Math.cos(a),y:Math.sin(a)}} function right(a){return{x:-Math.sin(a),y:Math.cos(a)}}
function makeCar(s,i){let p=starts[i];return{name:s[0],color:s[1],emoji:s[2],type:s[3],agg:s[4],caution:s[5],x:p[0],y:p[1],angle:Math.PI/2,speed:0,side:0,yaw:0,lap:1,cp:0,progress:0,nitro:1,score:0,combo:1,drifting:false,isPlayer:i===0,mode:i===0?"玩家":"巡航",max:i===0?420:330+Math.random()*60,acc:i===0?310:235+Math.random()*55,turn:i===0?3.15:2.4+Math.random()*.4,brk:i===0?360:250,grip:i===0?.78:.84,sidePick:Math.random()>.5?1:-1,done:false}}
function reset(){cars=specs.map(makeCar);player=cars[0];smoke=[];skids=[];running=true}
function updateCar(c,ctl,dt){
let drift=ctl.drift&&Math.abs(c.speed)>120,nit=ctl.nitro&&c.nitro>0&&c.speed>110;
if(ctl.throttle)c.speed+=c.acc*(nit?1.55:1)*dt;if(ctl.brake)c.speed-=c.brk*dt;
if(nit){c.nitro=Math.max(0,c.nitro-.32*dt);spawn(c,"#7df7ff",.65)}else c.nitro=Math.min(1,c.nitro+.08*dt);
c.speed=clamp(c.speed,-120,nit?c.max*1.35:c.max);
let ss=clamp(Math.abs(c.speed)/210,.18,1);c.yaw+=ctl.steer*c.turn*ss*(drift?1.45:1)*dt;c.yaw*=Math.pow(drift?.92:.78,dt*60);c.angle+=c.yaw;
c.side*=Math.pow(drift?.92:c.grip,dt*7);c.side+=ctl.steer*Math.abs(c.speed)*(drift?.42:.12)*dt;
let F=fwd(c.angle),R=right(c.angle);c.x+=(F.x*c.speed+R.x*c.side)*dt;c.y+=(F.y*c.speed+R.y*c.side)*dt;c.speed*=Math.pow(.986,dt*60);
if(!onRoad(c.x,c.y)){let p=centerPoint(centerAng(c.x,c.y));c.x+=(p.x-c.x)*.045;c.y+=(p.y-c.y)*.045;c.speed*=.965;c.side*=.9}
let slip=Math.abs(c.side);c.drifting=(drift||slip>60)&&Math.abs(c.speed)>145;
if(c.drifting){if(Math.random()>.48)skids.push({x:c.x,y:c.y,a:c.angle,life:1});spawn(c,"#dce6ef",.58);if(c.isPlayer){c.combo+=dt*.2;c.score+=Math.round((slip*.18+Math.abs(c.speed)*.08)*c.combo*dt*10)}}else if(c.isPlayer)c.combo=Math.max(1,c.combo-dt*.55);
checkCP(c)}
function checkCP(c){let p=cps[c.cp],d=Math.hypot(c.x-p.x,c.y-p.y);if(d<78){c.cp=(c.cp+1)%cps.length;if(c.cp===0){c.lap++;if(c.lap>3)c.done=true}}c.progress=(c.lap-1)*cps.length+c.cp+(1-Math.min(d/520,1))}
function adiff(a,b){let d=a-b;while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;return d}
function tang(c,t){return Math.atan2(t.y-c.y,t.x-c.x)}
function updateAI(c,dt){
let dp=Math.hypot(player.x-c.x,player.y-c.y),playerAhead=player.progress>c.progress||player.lap>c.lap,aiAhead=c.progress>player.progress&&c.lap>=player.lap;
let mode="巡航",target=cps[c.cp],throttle=true,brake=false,drift=false,nitro=false;
let near=cars.filter(o=>o!==c).sort((a,b)=>Math.hypot(a.x-c.x,a.y-c.y)-Math.hypot(b.x-c.x,b.y-c.y))[0];
if(dp<105&&aiAhead&&c.agg>.8){mode="阻擋";let F=fwd(player.angle);target={x:player.x+F.x*45,y:player.y+F.y*45}}
else if(playerAhead&&dp<255){mode="追擊";target={x:player.x,y:player.y};nitro=c.nitro>.25&&c.agg>.75}
else if(near&&Math.hypot(near.x-c.x,near.y-c.y)<105){mode="超車";target={x:near.x+Math.cos(near.angle+Math.PI/2)*c.sidePick*72,y:near.y+Math.sin(near.angle+Math.PI/2)*c.sidePick*72}}
else if(c.type==="保守"&&Math.abs(c.speed)>c.max*.78){mode="穩線";brake=true}
else if(c.type==="假動作"&&dp<180){mode="假動作";c.sidePick=Math.sin(performance.now()*.004)>0?1:-1;target={x:cps[c.cp].x+c.sidePick*80,y:cps[c.cp].y}}
let diff=adiff(tang(c,target),c.angle),steer=clamp(diff*1.45,-1,1);if(Math.abs(diff)>.65&&Math.abs(c.speed)>240){drift=c.type!=="保守"||Math.abs(diff)>.9;brake=c.caution>1.05}
if(c.type==="硬擠"&&dp<85){steer*=1.18;throttle=true}c.mode=mode;updateCar(c,{throttle,brake,steer,nitro,drift},dt)}
function updatePlayer(dt){let steerKey=(keys.has("KeyA")||keys.has("ArrowLeft")?-1:0)+(keys.has("KeyD")||keys.has("ArrowRight")?1:0);updateCar(player,{throttle:keys.has("KeyW")||keys.has("ArrowUp")||touch.gas,brake:keys.has("KeyS")||keys.has("ArrowDown")||touch.brake,steer:clamp(steerKey+touch.steer,-1,1),nitro:keys.has("ShiftLeft")||keys.has("ShiftRight")||touch.nitro,drift:keys.has("Space")||touch.drift},dt)}
function collisions(){for(let i=0;i<cars.length;i++)for(let j=i+1;j<cars.length;j++){let a=cars[i],b=cars[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy);if(d<38&&d>.001){let nx=dx/d,ny=dy/d,p=(38-d)*.55;a.x+=nx*p;a.y+=ny*p;b.x-=nx*p;b.y-=ny*p;a.speed*=.92;b.speed*=.92}}}
function spawn(c,color,power){if(smoke.length>300)smoke.shift();let F=fwd(c.angle),R=right(c.angle),s=Math.random()>.5?1:-1;smoke.push({x:c.x-F.x*34+R.x*s*13,y:c.y-F.y*34+R.y*s*13,vx:-F.x*45+(Math.random()-.5)*25,vy:-F.y*45+(Math.random()-.5)*25,size:10+Math.random()*16,life:.8+Math.random()*.4,color,power})}
function updateFX(dt){smoke=smoke.filter(p=>(p.life-=dt,p.x+=p.vx*dt,p.y+=p.vy*dt,p.size+=35*dt,p.life>0));skids.forEach(s=>s.life-=dt*.015);skids=skids.filter(s=>s.life>0);if(skids.length>260)skids.splice(0,skids.length-260)}
function cam(){let z=clamp(Math.min(W/980,H/620),.55,1.05);ctx.translate(W/2,H/2);ctx.scale(z,z);ctx.translate(-player.x,-player.y)}
function draw(){
ctx.fillStyle="#02040a";ctx.fillRect(0,0,W,H);ctx.save();cam();
let g=ctx.createRadialGradient(world.cx,world.cy,30,world.cx,world.cy,780);g.addColorStop(0,"#0b1c34");g.addColorStop(1,"#02040a");ctx.fillStyle=g;ctx.fillRect(-300,-220,1800,1200);
ctx.strokeStyle="rgba(0,234,255,.07)";for(let x=-400;x<1600;x+=60){ctx.beginPath();ctx.moveTo(x,-400);ctx.lineTo(x,1200);ctx.stroke()}for(let y=-400;y<1200;y+=60){ctx.beginPath();ctx.moveTo(-400,y);ctx.lineTo(1600,y);ctx.stroke()}
ctx.shadowBlur=25;ctx.shadowColor="#00eaff";ctx.fillStyle="#121a26";ctx.beginPath();ctx.ellipse(world.cx,world.cy,world.outerRx,world.outerRy,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#00eaff";ctx.lineWidth=8;ctx.stroke();
ctx.globalCompositeOperation="destination-out";ctx.beginPath();ctx.ellipse(world.cx,world.cy,world.innerRx,world.innerRy,0,0,Math.PI*2);ctx.fill();ctx.globalCompositeOperation="source-over";ctx.shadowBlur=0;ctx.strokeStyle="#ff3ee8";ctx.lineWidth=7;ctx.beginPath();ctx.ellipse(world.cx,world.cy,world.innerRx,world.innerRy,0,0,Math.PI*2);ctx.stroke();
ctx.strokeStyle="rgba(255,255,255,.22)";ctx.setLineDash([26,22]);ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(world.cx,world.cy,(world.outerRx+world.innerRx)/2,(world.outerRy+world.innerRy)/2,0,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
for(let i=0;i<96;i++){let a=i/96*Math.PI*2;ctx.save();ctx.translate(world.cx+Math.cos(a)*world.outerRx,world.cy+Math.sin(a)*world.outerRy);ctx.rotate(a);ctx.fillStyle=i%2?"#fff":"#ff213e";ctx.fillRect(-18,-5,36,10);ctx.restore()}
skids.forEach(s=>{ctx.save();ctx.globalAlpha=.35*s.life;ctx.translate(s.x,s.y);ctx.rotate(s.a);ctx.fillStyle="#020202";ctx.fillRect(-20,-4,40,8);ctx.restore()});
smoke.forEach(p=>{ctx.save();ctx.globalAlpha=Math.max(0,p.life)*.28*p.power;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();ctx.restore()});
ctx.restore();
cars.slice().sort((a,b)=>a.y-b.y).forEach(drawCar);drawMini();drawSpeed()}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function drawCar(c){ctx.save();cam();ctx.translate(c.x,c.y);ctx.rotate(c.angle);ctx.shadowBlur=c.isPlayer?22:14;ctx.shadowColor=c.color;ctx.fillStyle=c.color;rr(-31,-15,62,30,8);ctx.fill();ctx.fillStyle="#02080f";rr(-10,-12,24,24,6);ctx.fill();ctx.fillStyle="#fff";ctx.beginPath();ctx.moveTo(35,0);ctx.lineTo(18,-10);ctx.lineTo(18,10);ctx.fill();ctx.fillStyle="#050505";ctx.fillRect(-24,-20,14,7);ctx.fillRect(-24,13,14,7);ctx.fillRect(14,-20,14,7);ctx.fillRect(14,13,14,7);ctx.restore()}
function drawMini(){let x=14,y=H-194,w=124,h=82;ctx.save();ctx.fillStyle="rgba(0,0,0,.36)";ctx.strokeStyle="rgba(0,234,255,.55)";rr(x,y,w,h,12);ctx.fill();ctx.stroke();ctx.translate(x+w/2,y+h/2);ctx.scale(.095,.095);ctx.strokeStyle="#00eaff";ctx.lineWidth=28;ctx.beginPath();ctx.ellipse(0,0,world.outerRx,world.outerRy,0,0,Math.PI*2);ctx.stroke();ctx.strokeStyle="#ff3ee8";ctx.lineWidth=22;ctx.beginPath();ctx.ellipse(0,0,world.innerRx,world.innerRy,0,0,Math.PI*2);ctx.stroke();cars.forEach(c=>{ctx.fillStyle=c.isPlayer?"#00eaff":"#fff";ctx.beginPath();ctx.arc(c.x-world.cx,c.y-world.cy,c.isPlayer?34:25,0,Math.PI*2);ctx.fill()});ctx.restore()}
function drawSpeed(){let size=124,x=W-size-14,y=H-size-102,cx=x+size/2,cy=y+size/2,sp=Math.round(Math.abs(player.speed)*.85),pct=Math.min(sp/360,1),sa=Math.PI*.78,ea=Math.PI*2.22,a=sa+(ea-sa)*pct;ctx.save();ctx.lineWidth=8;ctx.strokeStyle="rgba(255,255,255,.18)";ctx.beginPath();ctx.arc(cx,cy,50,sa,ea);ctx.stroke();ctx.strokeStyle="#00eaff";ctx.beginPath();ctx.arc(cx,cy,50,sa,a);ctx.stroke();ctx.save();ctx.translate(cx,cy);ctx.rotate(a);ctx.strokeStyle="#ff3ee8";ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(44,0);ctx.stroke();ctx.restore();ctx.fillStyle="#fff";ctx.font="bold 28px Arial";ctx.textAlign="center";ctx.fillText(sp,cx,cy+12);ctx.fillStyle="rgba(255,255,255,.75)";ctx.font="12px Arial";ctx.fillText("KM/H",cx,cy+32);ctx.restore()}
function hud(){let ranked=cars.slice().sort((a,b)=>(b.lap*10+b.progress)-(a.lap*10+a.progress)),rank=ranked.indexOf(player)+1;lapEl.textContent=Math.min(player.lap,3);rankEl.textContent=rank;speedEl.textContent=Math.round(Math.abs(player.speed)*.85);scoreEl.textContent=player.score;nitroEl.style.width=Math.round(player.nitro*100)+"%";leader.innerHTML='<div style="color:#00eaff;font-weight:900">POSITION</div>'+ranked.map((c,i)=>`<div class="row ${c.isPlayer?'me':''}"><span>${i+1} ${c.emoji}${c.name}</span><span>${c.mode}</span></div>`).join("")}
function loop(t){let dt=Math.min((t-last)/1000,.033);last=t;if(running){updatePlayer(dt);cars.slice(1).forEach(c=>updateAI(c,dt));collisions();if(player.done){running=false;start.style.display="flex";start.querySelector("h1").textContent="FINISH!";start.querySelector("p").textContent=`完成比賽！漂移分數：${player.score}`;startBtn.textContent="重新開始"}}updateFX(dt);hud();draw();requestAnimationFrame(loop)}
function bind(btn,key){let set=v=>{touch[key]=v;btn.classList.toggle("active",v)};["pointerdown","touchstart"].forEach(e=>btn.addEventListener(e,ev=>{ev.preventDefault();set(true)},{passive:false}));["pointerup","pointerleave","pointercancel","touchend","touchcancel"].forEach(e=>btn.addEventListener(e,ev=>{ev.preventDefault();set(false)},{passive:false}))}
function setup(){bind(gas,"gas");bind(brake,"brake");bind(boost,"nitro");bind(driftBtn,"drift");let active=null;function upd(x,y){let r=steer.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,m=r.width*.38,nx=clamp((x-cx)/m,-1,1),ny=clamp((y-cy)/m,-1,1),len=Math.min(1,Math.hypot(nx,ny)),a=Math.atan2(ny,nx);touch.steer=nx;knob.style.transform=`translate(${Math.cos(a)*len*m}px,${Math.sin(a)*len*m}px)`}function resetS(){touch.steer=0;knob.style.transform="translate(0,0)";active=null}steer.addEventListener("pointerdown",e=>{e.preventDefault();active=e.pointerId;steer.setPointerCapture(e.pointerId);upd(e.clientX,e.clientY)});steer.addEventListener("pointermove",e=>{if(e.pointerId!==active)return;e.preventDefault();upd(e.clientX,e.clientY)});steer.addEventListener("pointerup",resetS);steer.addEventListener("pointercancel",resetS);document.addEventListener("touchmove",e=>e.preventDefault(),{passive:false})}
addEventListener("keydown",e=>{keys.add(e.code);if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space","ShiftLeft","ShiftRight"].includes(e.code))e.preventDefault()});addEventListener("keyup",e=>keys.delete(e.code));addEventListener("resize",resize);startBtn.addEventListener("click",()=>{reset();start.style.display="none"});resize();setup();reset();running=false;requestAnimationFrame(loop);
})();
</script>
</body>
</html>
