<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Neon Racer 3D - Single File</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #02040a;
      color: white;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    canvas { display: block; }

    #hud {
      position: fixed;
      top: max(8px, env(safe-area-inset-top));
      left: max(8px, env(safe-area-inset-left));
      z-index: 10;
      min-width: 200px;
      padding: 10px 13px;
      line-height: 1.55;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(0, 234, 255, 0.68);
      border-radius: 14px;
      box-shadow: 0 0 22px rgba(0, 234, 255, 0.35);
      backdrop-filter: blur(8px);
      font-size: 14px;
    }

    .logo {
      color: #00eaff;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .barWrap {
      margin-top: 7px;
      width: 100%;
      height: 11px;
      border: 1px solid #00eaff;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
    }

    #nitroBar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #00eaff, #7a5cff, #ff3ee8);
      box-shadow: 0 0 12px #00eaff;
    }

    #leaderboard {
      position: fixed;
      top: max(8px, env(safe-area-inset-top));
      right: max(8px, env(safe-area-inset-right));
      z-index: 10;
      min-width: 180px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 18px rgba(0, 234, 255, 0.22);
      font-size: 12px;
      line-height: 1.45;
    }

    #leaderboard .boardTitle {
      color: #00eaff;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    #leaderboard .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 2px 0;
    }

    #leaderboard .me {
      color: #00eaff;
      text-shadow: 0 0 8px #00eaff;
    }

    #minimap {
      position: fixed;
      left: max(10px, env(safe-area-inset-left));
      bottom: calc(108px + env(safe-area-inset-bottom));
      z-index: 10;
      width: 150px;
      height: 102px;
      background: rgba(0, 0, 0, 0.36);
      border: 1px solid rgba(0, 234, 255, 0.55);
      border-radius: 13px;
      box-shadow: 0 0 18px rgba(0, 234, 255, 0.25);
    }

    #speedometer {
      position: fixed;
      right: max(12px, env(safe-area-inset-right));
      bottom: calc(98px + env(safe-area-inset-bottom));
      z-index: 10;
      width: 150px;
      height: 150px;
      filter: drop-shadow(0 0 14px rgba(0, 234, 255, 0.4));
    }

    #mobileControls {
      position: fixed;
      inset: auto 0 0 0;
      z-index: 30;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 max(18px, env(safe-area-inset-right)) calc(18px + env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
      pointer-events: none;
    }

    #steerPad {
      width: 124px;
      height: 124px;
      border-radius: 50%;
      border: 1px solid rgba(0, 234, 255, 0.72);
      background: radial-gradient(circle, rgba(0, 234, 255, 0.13), rgba(0, 0, 0, 0.44));
      box-shadow: 0 0 22px rgba(0, 234, 255, 0.32), inset 0 0 18px rgba(0, 234, 255, 0.12);
      position: relative;
      pointer-events: auto;
      backdrop-filter: blur(8px);
      -webkit-tap-highlight-color: transparent;
    }

    #steerPad span {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 15px;
      text-align: center;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 1px;
    }

    #steerKnob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 52px;
      height: 52px;
      margin-left: -26px;
      margin-top: -26px;
      border-radius: 50%;
      background: rgba(0, 234, 255, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.55);
      box-shadow: 0 0 18px rgba(0, 234, 255, 0.55);
    }

    .rightControls {
      display: grid;
      grid-template-columns: 66px 82px;
      grid-template-rows: 62px 86px;
      gap: 9px;
      pointer-events: auto;
      align-items: end;
    }

    .touchBtn {
      border-radius: 50%;
      border: 1px solid rgba(0, 234, 255, 0.85);
      background: rgba(0, 12, 24, 0.55);
      color: #eaffff;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 0 18px rgba(0, 234, 255, 0.35), inset 0 0 16px rgba(0, 234, 255, 0.15);
      backdrop-filter: blur(8px);
      -webkit-tap-highlight-color: transparent;
    }

    .touchBtn:active,
    .touchBtn.active {
      transform: scale(0.94);
      background: rgba(0, 234, 255, 0.28);
    }

    .touchBtn.small {
      width: 62px;
      height: 62px;
    }

    .touchBtn.drift {
      width: 70px;
      height: 70px;
      border-color: rgba(255, 196, 0, 0.9);
      box-shadow: 0 0 18px rgba(255, 196, 0, 0.32), inset 0 0 16px rgba(255, 196, 0, 0.12);
    }

    .touchBtn.nitro {
      width: 70px;
      height: 70px;
      border-color: rgba(255, 62, 232, 0.9);
      box-shadow: 0 0 18px rgba(255, 62, 232, 0.35), inset 0 0 16px rgba(255, 62, 232, 0.15);
    }

    .touchBtn.gas {
      width: 86px;
      height: 86px;
      border-color: rgba(0, 255, 170, 0.9);
      box-shadow: 0 0 18px rgba(0, 255, 170, 0.35), inset 0 0 16px rgba(0, 255, 170, 0.15);
    }

    #start {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, rgba(0, 234, 255, 0.16), rgba(0, 0, 0, 0.92)), #02040a;
      text-align: center;
    }

    #start h1 {
      margin: 0;
      font-size: clamp(40px, 8vw, 80px);
      color: #00eaff;
      text-shadow: 0 0 28px #00eaff;
      letter-spacing: 4px;
    }

    #start p {
      color: #dffcff;
      margin: 16px 0 26px;
      max-width: 560px;
      padding: 0 20px;
    }

    .startHint {
      margin-top: 18px;
      color: rgba(255, 255, 255, 0.68);
      font-size: 14px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 34px;
      font-size: 20px;
      font-weight: bold;
      color: #001018;
      background: #00eaff;
      cursor: pointer;
      box-shadow: 0 0 24px #00eaff;
    }

    @media (max-width: 900px), (pointer: coarse) {
      #hud {
        min-width: 145px;
        padding: 7px 9px;
        font-size: 11px;
        line-height: 1.35;
        border-radius: 12px;
      }

      #leaderboard {
        min-width: 128px;
        padding: 7px 9px;
        font-size: 10px;
        line-height: 1.25;
        border-radius: 12px;
      }

      #minimap {
        width: 122px;
        height: 82px;
      }

      #speedometer {
        width: 122px;
        height: 122px;
      }

      #steerPad {
        width: 118px;
        height: 118px;
      }

      .rightControls {
        grid-template-columns: 60px 76px;
        grid-template-rows: 56px 80px;
        gap: 8px;
      }

      .touchBtn.small {
        width: 56px;
        height: 56px;
      }

      .touchBtn.drift,
      .touchBtn.nitro {
        width: 64px;
        height: 64px;
      }

      .touchBtn.gas {
        width: 80px;
        height: 80px;
      }

      #start h1 {
        font-size: 42px;
      }

      #start p {
        font-size: 14px;
        max-width: 300px;
      }
    }

    @media (orientation: portrait) and (max-width: 900px) {
      #start::after {
        content: "建議橫向遊玩，畫面和操作會比較像賽車遊戲";
        position: absolute;
        bottom: 22px;
        left: 24px;
        right: 24px;
        color: rgba(255, 255, 255, 0.72);
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="logo">NEON RACER</div>
    <div>版本：<span>單檔可玩</span></div>
    <div>圈數：<span id="lap">1</span> / 3</div>
    <div>排名：<span id="rank">1</span> / 6</div>
    <div>速度：<span id="speed">0</span> km/h</div>
    <div>漂移：<span id="driftScore">0</span></div>
    <div>AI：<span id="aiState">待機</span></div>
    <div class="barWrap"><div id="nitroBar"></div></div>
  </div>

  <div id="leaderboard"></div>
  <canvas id="minimap" width="150" height="102"></canvas>
  <canvas id="speedometer" width="150" height="150"></canvas>

  <div id="mobileControls">
    <div id="steerPad">
      <div id="steerKnob"></div>
      <span>STEER</span>
    </div>
    <div class="rightControls">
      <button class="touchBtn small" id="btnBrake">BRAKE</button>
      <button class="touchBtn drift" id="btnDrift">DRIFT</button>
      <button class="touchBtn nitro" id="btnNitro">NITRO</button>
      <button class="touchBtn gas" id="btnGas">GAS</button>
    </div>
  </div>

  <div id="start">
    <h1>NEON RACER 3D</h1>
    <p>單一 index.html 版本：沒有 assets 資料夾，直接上傳 GitHub Pages 就能玩。</p>
    <button id="startBtn">開始比賽</button>
    <div class="startHint">手機建議橫向遊玩｜電腦支援鍵盤</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
  <script>
    const lapEl = document.getElementById("lap");
    const rankEl = document.getElementById("rank");
    const speedEl = document.getElementById("speed");
    const driftScoreEl = document.getElementById("driftScore");
    const aiStateEl = document.getElementById("aiState");
    const nitroBar = document.getElementById("nitroBar");
    const leaderboardEl = document.getElementById("leaderboard");
    const minimap = document.getElementById("minimap");
    const minimapCtx = minimap.getContext("2d");
    const speedometer = document.getElementById("speedometer");
    const speedCtx = speedometer.getContext("2d");
    const startPanel = document.getElementById("start");
    const startBtn = document.getElementById("startBtn");

    const ui = {
      steerPad: document.getElementById("steerPad"),
      steerKnob: document.getElementById("steerKnob"),
      gas: document.getElementById("btnGas"),
      brake: document.getElementById("btnBrake"),
      nitro: document.getElementById("btnNitro"),
      drift: document.getElementById("btnDrift")
    };

    const keys = new Set();
    const touchInput = { steer: 0, gas: false, brake: false, nitro: false, drift: false };

    let running = false;
    let last = 0;
    let cars = [];
    let player = null;
    let skidMarks = [];
    let smokeParticles = [];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x08101b);
    scene.fog = new THREE.Fog(0x08101b, 45, 255);

    const camera = new THREE.PerspectiveCamera(68, window.innerWidth / window.innerHeight, 0.1, 800);
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.7));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0xbfeeff, 0x1a0a25, 1.05);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xffffff, 1.55);
    sun.position.set(55, 75, -30);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    scene.add(sun);

    const track = { outerRx: 96, outerRz: 61, innerRx: 49, innerRz: 26 };
    const checkpoints = [
      { x: 0, z: -55 },
      { x: 86, z: 0 },
      { x: 0, z: 55 },
      { x: -86, z: 0 }
    ];

    const personalities = [
      { name: "你", color: 0x00eaff, emoji: "🏎️", type: "玩家" },
      { name: "Tiger", color: 0xff4b2b, emoji: "🐯", type: "攻擊", aggression: 1.25, caution: 0.55, overtake: 1.15 },
      { name: "Turtle", color: 0x5dff86, emoji: "🐢", type: "保守", aggression: 0.55, caution: 1.35, overtake: 0.72 },
      { name: "Eagle", color: 0xf6ff5d, emoji: "🦅", type: "抓線", aggression: 0.9, caution: 0.9, overtake: 1.35 },
      { name: "Fox", color: 0xff4fd8, emoji: "🦊", type: "假動作", aggression: 0.95, caution: 0.8, overtake: 1.45 },
      { name: "Bull", color: 0xb16bff, emoji: "🦬", type: "硬擠", aggression: 1.45, caution: 0.45, overtake: 0.95 }
    ];

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function ellipseValue(x, z, rx, rz) {
      return (x * x) / (rx * rx) + (z * z) / (rz * rz);
    }

    function onRoad(x, z) {
      return ellipseValue(x, z, track.outerRx, track.outerRz) <= 1 &&
             ellipseValue(x, z, track.innerRx, track.innerRz) >= 1;
    }

    function roadCenterAngle(x, z) {
      return Math.atan2(z / track.outerRz, x / track.outerRx);
    }

    function roadCenterPoint(a) {
      const rx = (track.outerRx + track.innerRx) * 0.5;
      const rz = (track.outerRz + track.innerRz) * 0.5;
      return { x: Math.cos(a) * rx, z: Math.sin(a) * rz };
    }

    function makeMat(color, emissive = 0x000000, intensity = 0, roughness = 0.45, metalness = 0.2) {
      return new THREE.MeshStandardMaterial({
        color,
        emissive,
        emissiveIntensity: intensity,
        roughness,
        metalness
      });
    }

    function createAsphaltTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#151923";
      ctx.fillRect(0, 0, 256, 256);

      for (let i = 0; i < 4300; i++) {
        const v = 18 + Math.floor(Math.random() * 45);
        ctx.fillStyle = `rgba(${v}, ${v + 3}, ${v + 8}, ${Math.random() * 0.35})`;
        ctx.fillRect(Math.random() * 256, Math.random() * 256, 1 + Math.random() * 2, 1 + Math.random() * 2);
      }

      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(8, 5);
      return tex;
    }

    function createWorld() {
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(460, 460),
        makeMat(0x05100b, 0, 0, 0.95, 0)
      );
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);

      const roadShape = new THREE.Shape();
      roadShape.absellipse(0, 0, track.outerRx, track.outerRz, 0, Math.PI * 2, false, 0);

      const hole = new THREE.Path();
      hole.absellipse(0, 0, track.innerRx, track.innerRz, 0, Math.PI * 2, true, 0);
      roadShape.holes.push(hole);

      const road = new THREE.Mesh(
        new THREE.ShapeGeometry(roadShape, 192),
        new THREE.MeshStandardMaterial({
          color: 0xffffff,
          map: createAsphaltTexture(),
          roughness: 0.82,
          metalness: 0.05
        })
      );
      road.rotation.x = -Math.PI / 2;
      road.position.y = 0.03;
      road.receiveShadow = true;
      scene.add(road);

      createCurbs();
      createRoadLines();
      createGuardRails();
      createArrowSigns();
      createLampPosts();
      createTreesAndRocks();
      createMountains();
      createCity();
      createStartLine();
    }

    function createCurbs() {
      const red = makeMat(0xff213e, 0x4a0010, 0.25);
      const white = makeMat(0xffffff, 0x222222, 0.1);

      for (let i = 0; i < 112; i++) {
        const a = i / 112 * Math.PI * 2;
        const useRed = i % 2 === 0;

        const outer = new THREE.Mesh(new THREE.BoxGeometry(3.8, 0.13, 0.9), useRed ? red : white);
        outer.position.set(Math.cos(a) * track.outerRx, 0.16, Math.sin(a) * track.outerRz);
        outer.rotation.y = -a;
        scene.add(outer);

        const inner = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.13, 0.75), useRed ? white : red);
        inner.position.set(Math.cos(a) * track.innerRx, 0.16, Math.sin(a) * track.innerRz);
        inner.rotation.y = -a;
        scene.add(inner);
      }
    }

    function createRoadLines() {
      const pts = [];

      for (let i = 0; i <= 260; i++) {
        const a = i / 260 * Math.PI * 2;
        const p = roadCenterPoint(a);
        pts.push(new THREE.Vector3(p.x, 0.1, p.z));
      }

      scene.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.35 })
      ));

      function addRing(rx, rz, color) {
        const ring = [];

        for (let i = 0; i <= 260; i++) {
          const a = i / 260 * Math.PI * 2;
          ring.push(new THREE.Vector3(Math.cos(a) * rx, 0.13, Math.sin(a) * rz));
        }

        scene.add(new THREE.Line(
          new THREE.BufferGeometry().setFromPoints(ring),
          new THREE.LineBasicMaterial({ color })
        ));
      }

      addRing(track.outerRx, track.outerRz, 0x00eaff);
      addRing(track.innerRx, track.innerRz, 0xff3ee8);
    }

    function createGuardRails() {
      const railMat = makeMat(0x0b1728, 0x003b55, 0.5, 0.3, 0.55);

      for (let i = 0; i < 92; i++) {
        const a = i / 92 * Math.PI * 2;
        const rail = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.58, 0.36), railMat);
        rail.position.set(Math.cos(a) * 103, 0.65, Math.sin(a) * 67);
        rail.rotation.y = -a;
        rail.castShadow = true;
        scene.add(rail);
      }
    }

    function createArrowSigns() {
      const arrowMat = makeMat(0xffc400, 0xff8c00, 1.25);
      const blackMat = makeMat(0x080808);

      [[80, -25, -0.78], [89, -5, -1.03], [82, 21, -1.25], [-80, 25, 2.35], [-89, 5, 2.1], [-82, -21, 1.82]].forEach(([x, z, rot]) => {
        const group = new THREE.Group();
        const board = new THREE.Mesh(new THREE.BoxGeometry(8.2, 3.5, 0.28), blackMat);
        board.position.y = 2.6;
        group.add(board);

        for (let i = -1; i <= 1; i++) {
          const c = new THREE.Mesh(new THREE.BoxGeometry(1.15, 2.38, 0.36), arrowMat);
          c.position.set(i * 1.72, 2.6, 0.2);
          c.rotation.z = Math.PI / 5;
          group.add(c);
        }

        group.position.set(x, 0, z);
        group.rotation.y = rot;
        scene.add(group);
      });
    }

    function createLampPosts() {
      const poleMat = makeMat(0x111822, 0x001522, 0.2, 0.35, 0.5);

      for (let i = 0; i < 22; i++) {
        const a = i / 22 * Math.PI * 2;
        const x = Math.cos(a) * 112;
        const z = Math.sin(a) * 72;

        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.18, 7, 10), poleMat);
        pole.position.set(x, 3.5, z);
        scene.add(pole);

        const lightBox = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.35, 0.55), makeMat(0x9df7ff, 0x00eaff, 1.8));
        lightBox.position.set(x, 7.1, z);
        lightBox.rotation.y = -a;
        scene.add(lightBox);

        const light = new THREE.PointLight(0x72f5ff, 0.8, 24);
        light.position.set(x, 6.8, z);
        scene.add(light);
      }
    }

    function createTreesAndRocks() {
      const trunkMat = makeMat(0x3a2110);
      const leafMat = makeMat(0x0b3c24, 0x002010, 0.15, 0.9, 0);
      const rockMat = makeMat(0x4d555f, 0, 0, 0.8, 0.05);

      for (let i = 0; i < 95; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.random() > 0.45 ? 126 + Math.random() * 70 : 18 + Math.random() * 18;
        const x = Math.cos(a) * r;
        const z = Math.sin(a) * r;

        if (onRoad(x, z)) continue;

        const group = new THREE.Group();

        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.34, 3.2, 8), trunkMat);
        trunk.position.y = 1.6;
        group.add(trunk);

        const crown = new THREE.Mesh(new THREE.ConeGeometry(1.7, 5.2, 8), leafMat);
        crown.position.y = 5.1;
        crown.castShadow = true;
        group.add(crown);

        group.position.set(x, 0, z);
        group.rotation.y = Math.random() * Math.PI;
        scene.add(group);
      }

      for (let i = 0; i < 42; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = 118 + Math.random() * 70;

        const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(1.2 + Math.random() * 1.6, 0), rockMat);
        rock.position.set(Math.cos(a) * r, 0.8, Math.sin(a) * r);
        rock.scale.y = 0.5 + Math.random() * 0.6;
        rock.castShadow = true;
        scene.add(rock);
      }
    }

    function createMountains() {
      const mat = makeMat(0x172033, 0x02040a, 0.2, 0.82, 0.02);

      for (let i = 0; i < 18; i++) {
        const a = i / 18 * Math.PI * 2;
        const m = new THREE.Mesh(new THREE.ConeGeometry(18 + Math.random() * 12, 32 + Math.random() * 25, 6), mat);
        m.position.set(Math.cos(a) * (195 + Math.random() * 32), 13, Math.sin(a) * (195 + Math.random() * 32));
        m.rotation.y = Math.random() * Math.PI;
        scene.add(m);
      }
    }

    function createCity() {
      const mat = makeMat(0x091224, 0x001d36, 0.65);

      for (let i = 0; i < 70; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = 142 + Math.random() * 75;
        const h = 9 + Math.random() * 42;

        const b = new THREE.Mesh(new THREE.BoxGeometry(4 + Math.random() * 7, h, 4 + Math.random() * 7), mat);
        b.position.set(Math.cos(a) * r, h / 2, Math.sin(a) * r);
        b.castShadow = true;
        b.receiveShadow = true;
        scene.add(b);

        if (Math.random() > 0.55) {
          const light = new THREE.PointLight(Math.random() > 0.5 ? 0x00eaff : 0xff3ee8, 0.75, 26);
          light.position.set(b.position.x, h + 1, b.position.z);
          scene.add(light);
        }
      }
    }

    function createStartLine() {
      for (let i = -5; i <= 5; i++) {
        const block = new THREE.Mesh(
          new THREE.BoxGeometry(3.0, 0.12, 1.0),
          makeMat(i % 2 === 0 ? 0xffffff : 0x00eaff, i % 2 === 0 ? 0x222222 : 0x00eaff, 0.8)
        );
        block.position.set(i * 3.0, 0.18, -55);
        scene.add(block);
      }
    }

    function createCarMesh(color, isPlayer = false) {
      const g = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(4.4, 0.8, 7.2),
        makeMat(color, color, isPlayer ? 0.75 : 0.45, 0.28, 0.45)
      );
      body.position.y = 0.75;
      body.castShadow = true;
      g.add(body);

      const nose = new THREE.Mesh(
        new THREE.BoxGeometry(3.5, 0.55, 2.6),
        makeMat(color, color, isPlayer ? 0.75 : 0.45, 0.28, 0.45)
      );
      nose.position.set(0, 1.0, -2.8);
      nose.castShadow = true;
      g.add(nose);

      const cabin = new THREE.Mesh(
        new THREE.BoxGeometry(2.55, 0.85, 2.25),
        makeMat(0x02080f, color, 0.18, 0.16, 0.7)
      );
      cabin.position.set(0, 1.55, 0.05);
      cabin.castShadow = true;
      g.add(cabin);

      const wing = new THREE.Mesh(new THREE.BoxGeometry(5.2, 0.18, 0.75), makeMat(color, color, 0.5));
      wing.position.set(0, 1.72, 3.45);
      wing.castShadow = true;
      g.add(wing);

      const wheelMat = makeMat(0x050505, 0, 0, 0.55, 0.25);
      [[-2.25, 0.48, -2.35], [2.25, 0.48, -2.35], [-2.25, 0.48, 2.35], [2.25, 0.48, 2.35]].forEach(p => {
        const w = new THREE.Mesh(new THREE.CylinderGeometry(0.52, 0.52, 0.58, 22), wheelMat);
        w.rotation.z = Math.PI / 2;
        w.position.set(p[0], p[1], p[2]);
        w.castShadow = true;
        g.add(w);
      });

      const tail = new THREE.PointLight(0xff0040, isPlayer ? 2.2 : 1.2, 16);
      tail.position.set(0, 1, 4);
      g.add(tail);

      scene.add(g);
      return g;
    }

    function createCar(config, isPlayer = false) {
      const mesh = createCarMesh(config.color, isPlayer);

      return {
        name: config.name,
        emoji: config.emoji,
        type: config.type,
        color: config.color,
        mesh,
        x: 0,
        z: -47,
        angle: Math.PI,
        speed: 0,
        sideSpeed: 0,
        yawVel: 0,
        lap: 1,
        cp: 0,
        progress: 0,
        nitro: 1,
        driftScore: 0,
        combo: 1,
        isDrifting: false,
        isPlayer,
        finished: false,
        maxSpeed: isPlayer ? 84 : 64 + Math.random() * 12,
        accel: isPlayer ? 54 : 37 + Math.random() * 10,
        brake: isPlayer ? 68 : 46,
        steerPower: isPlayer ? 2.8 : 2.25,
        grip: isPlayer ? 0.78 : 0.84,
        aiMode: isPlayer ? "玩家" : "巡航",
        aggression: config.aggression || 1,
        caution: config.caution || 1,
        overtake: config.overtake || 1,
        overtakeSide: Math.random() > 0.5 ? 1 : -1
      };
    }

    function getForward(angle) {
      return { x: -Math.sin(angle), z: -Math.cos(angle) };
    }

    function getRight(angle) {
      return { x: Math.cos(angle), z: -Math.sin(angle) };
    }

    function updateCarPhysics(car, controls, dt) {
      const driftIntent = controls.drift && Math.abs(car.speed) > 17;
      const usingNitro = controls.nitro && car.nitro > 0 && car.speed > 14;

      if (controls.throttle > 0) {
        car.speed += car.accel * controls.throttle * (usingNitro ? 1.55 : 1) * dt;
      }

      if (controls.brake > 0) {
        car.speed -= car.brake * controls.brake * dt;
      }

      if (usingNitro) {
        car.nitro = Math.max(0, car.nitro - 0.32 * dt);
        spawnSmoke(car, 0x79f7ff, 0.75);
      } else {
        car.nitro = Math.min(1, car.nitro + 0.08 * dt);
      }

      const max = usingNitro ? car.maxSpeed * 1.35 : car.maxSpeed;
      car.speed = clamp(car.speed, -26, max);

      const steerScale = clamp(Math.abs(car.speed) / 35, 0.16, 1);
      const yawBoost = driftIntent ? 1.45 : 1;
      car.yawVel += controls.steer * car.steerPower * steerScale * yawBoost * dt;
      car.yawVel *= Math.pow(driftIntent ? 0.92 : 0.78, dt * 60);
      car.angle += car.yawVel;

      const grip = driftIntent ? 0.18 : car.grip;
      car.sideSpeed *= Math.pow(grip, dt * 7);
      car.sideSpeed += controls.steer * Math.abs(car.speed) * (driftIntent ? 0.22 : 0.08) * dt;

      const f = getForward(car.angle);
      const r = getRight(car.angle);

      car.x += (f.x * car.speed + r.x * car.sideSpeed) * dt;
      car.z += (f.z * car.speed + r.z * car.sideSpeed) * dt;

      car.speed *= Math.pow(0.987, dt * 60);

      if (!onRoad(car.x, car.z)) {
        const a = roadCenterAngle(car.x, car.z);
        const center = roadCenterPoint(a);
        car.x += (center.x - car.x) * 0.035;
        car.z += (center.z - car.z) * 0.035;
        car.speed *= 0.965;
        car.sideSpeed *= 0.92;
      }

      const slip = Math.abs(car.sideSpeed);
      car.isDrifting = (driftIntent || slip > 7.5) && Math.abs(car.speed) > 21;

      if (car.isDrifting) {
        if (Math.random() > 0.48) addSkidMark(car);
        spawnSmoke(car, 0xdde6ee, 0.58);

        if (car.isPlayer) {
          car.combo += dt * 0.18;
          car.driftScore += Math.round((slip + Math.abs(car.speed) * 0.12) * car.combo * dt * 9);
        }
      } else if (car.isPlayer) {
        car.combo = Math.max(1, car.combo - dt * 0.5);
      }

      car.mesh.position.set(car.x, 0, car.z);
      car.mesh.rotation.y = car.angle;

      checkCheckpoint(car);
    }

    function checkCheckpoint(car) {
      const target = checkpoints[car.cp];
      const d = Math.hypot(car.x - target.x, car.z - target.z);

      if (d < 19) {
        car.cp = (car.cp + 1) % checkpoints.length;

        if (car.cp === 0) {
          car.lap++;

          if (car.lap > 3) {
            car.finished = true;
          }
        }
      }

      car.progress = (car.lap - 1) * checkpoints.length + car.cp + (1 - Math.min(d / 145, 1));
    }

    function targetAngleTo(car, target) {
      return Math.atan2(-(target.x - car.x), -(target.z - car.z));
    }

    function angleDiff(a, b) {
      let d = a - b;
      while (d > Math.PI) d -= Math.PI * 2;
      while (d < -Math.PI) d += Math.PI * 2;
      return d;
    }

    function updatePlayer(dt) {
      const steerKeyboard = (keys.has("KeyA") || keys.has("ArrowLeft") ? -1 : 0) +
                            (keys.has("KeyD") || keys.has("ArrowRight") ? 1 : 0);

      updateCarPhysics(player, {
        throttle: keys.has("KeyW") || keys.has("ArrowUp") || touchInput.gas ? 1 : 0,
        brake: keys.has("KeyS") || keys.has("ArrowDown") || touchInput.brake ? 1 : 0,
        steer: clamp(steerKeyboard + touchInput.steer, -1, 1),
        nitro: keys.has("ShiftLeft") || keys.has("ShiftRight") || touchInput.nitro,
        drift: keys.has("Space") || touchInput.drift
      }, dt);
    }

    function updateAI(car, dt) {
      const distToPlayer = Math.hypot(player.x - car.x, player.z - car.z);
      const playerAhead = player.progress > car.progress || player.lap > car.lap;
      const aiAhead = car.progress > player.progress && car.lap >= player.lap;

      let mode = "巡航";
      let target = checkpoints[car.cp];
      let throttle = 0.86;
      let brake = 0;
      let drift = false;
      let nitro = false;

      const aheadCar = cars
        .filter(c => c !== car)
        .sort((a, b) => Math.hypot(a.x - car.x, a.z - car.z) - Math.hypot(b.x - car.x, b.z - car.z))[0];

      if (distToPlayer < 24 && aiAhead && car.aggression > 0.8) {
        mode = "阻擋";
        const f = getForward(player.angle);
        target = { x: player.x + f.x * 5, z: player.z + f.z * 5 };
        throttle = 0.72 + car.aggression * 0.12;
      } else if (playerAhead && distToPlayer < 64) {
        mode = "追擊";
        target = { x: player.x, z: player.z };
        throttle = 1;
        nitro = car.nitro > 0.28 && car.aggression > 0.75;
      } else if (aheadCar && Math.hypot(aheadCar.x - car.x, aheadCar.z - car.z) < 25) {
        mode = "超車";
        const side = car.overtakeSide * car.overtake;
        target = {
          x: aheadCar.x + Math.cos(aheadCar.angle) * side * 9,
          z: aheadCar.z - Math.sin(aheadCar.angle) * side * 9
        };
        throttle = 0.95 + car.aggression * 0.08;
      } else if (car.type === "保守" && Math.abs(car.speed) > car.maxSpeed * 0.78) {
        mode = "穩線";
        throttle = 0.72;
        brake = 0.12;
      } else if (car.type === "假動作" && distToPlayer < 42) {
        mode = "假動作";
        car.overtakeSide = Math.sin(performance.now() * 0.004) > 0 ? 1 : -1;
        target = { x: checkpoints[car.cp].x + car.overtakeSide * 10, z: checkpoints[car.cp].z };
        throttle = 0.92;
      }

      const desired = targetAngleTo(car, target);
      const diff = angleDiff(desired, car.angle);

      let steer = clamp(diff * 1.55, -1, 1);

      if (Math.abs(diff) > 0.58 && Math.abs(car.speed) > 34) {
        drift = car.type !== "保守" || Math.abs(diff) > 0.9;
        brake = car.caution > 1 ? 0.18 : 0.05;
      }

      if (car.type === "硬擠" && distToPlayer < 18) {
        steer *= 1.2;
        throttle = 1;
      }

      car.aiMode = mode;
      updateCarPhysics(car, { throttle, brake, steer, nitro, drift }, dt);
    }

    function addSkidMark(car) {
      if (skidMarks.length > 220) {
        const old = skidMarks.shift();
        scene.remove(old);
        old.geometry.dispose();
        old.material.dispose();
      }

      const mark = new THREE.Mesh(
        new THREE.PlaneGeometry(1.15, 4.9),
        new THREE.MeshBasicMaterial({
          color: 0x030303,
          transparent: true,
          opacity: 0.35,
          depthWrite: false
        })
      );

      mark.rotation.x = -Math.PI / 2;
      mark.rotation.z = -car.angle;
      mark.position.set(car.x, 0.042, car.z);
      scene.add(mark);
      skidMarks.push(mark);
    }

    function spawnSmoke(car, color = 0xdde6ee, strength = 1) {
      if (smokeParticles.length > 240) {
        const s = smokeParticles.shift();
        scene.remove(s.mesh);
        s.mesh.geometry.dispose();
        s.mesh.material.dispose();
      }

      const f = getForward(car.angle);
      const r = getRight(car.angle);

      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.45 + Math.random() * 0.5, 8, 8),
        new THREE.MeshBasicMaterial({
          color,
          transparent: true,
          opacity: 0.28 * strength,
          depthWrite: false
        })
      );

      const side = Math.random() > 0.5 ? 1 : -1;

      mesh.position.set(
        car.x - f.x * 3.4 + r.x * side * 1.3,
        0.45,
        car.z - f.z * 3.4 + r.z * side * 1.3
      );

      scene.add(mesh);

      smokeParticles.push({
        mesh,
        life: 0.72 + Math.random() * 0.35,
        vx: -f.x * 2 + (Math.random() - 0.5) * 2,
        vz: -f.z * 2 + (Math.random() - 0.5) * 2
      });
    }

    function updateSmoke(dt) {
      for (let i = smokeParticles.length - 1; i >= 0; i--) {
        const s = smokeParticles[i];

        s.life -= dt;
        s.mesh.position.x += s.vx * dt;
        s.mesh.position.z += s.vz * dt;
        s.mesh.position.y += 0.9 * dt;
        s.mesh.scale.multiplyScalar(1 + dt * 1.8);
        s.mesh.material.opacity = Math.max(0, s.life * 0.25);

        if (s.life <= 0) {
          scene.remove(s.mesh);
          s.mesh.geometry.dispose();
          s.mesh.material.dispose();
          smokeParticles.splice(i, 1);
        }
      }
    }

    function drawMinimap() {
      const ctx = minimapCtx;
      ctx.clearRect(0, 0, minimap.width, minimap.height);
      ctx.save();
      ctx.translate(minimap.width / 2, minimap.height / 2);
      ctx.scale(0.68, 0.68);

      ctx.strokeStyle = "rgba(0,234,255,.95)";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.ellipse(0, 0, track.outerRx, track.outerRz, 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.strokeStyle = "rgba(255,62,232,.85)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.ellipse(0, 0, track.innerRx, track.innerRz, 0, 0, Math.PI * 2);
      ctx.stroke();

      cars.forEach(c => {
        ctx.fillStyle = c.isPlayer ? "#00eaff" : "#ffffff";
        ctx.beginPath();
        ctx.arc(c.x, c.z, c.isPlayer ? 4.4 : 3.2, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.restore();
    }

    function drawSpeedometer() {
      const ctx = speedCtx;
      const w = speedometer.width;
      const h = speedometer.height;
      const cx = w / 2;
      const cy = h / 2;
      const speed = Math.round(Math.abs(player.speed) * 4.2);
      const pct = Math.min(speed / 470, 1);
      const start = Math.PI * 0.78;
      const end = Math.PI * 2.22;
      const angle = start + (end - start) * pct;

      ctx.clearRect(0, 0, w, h);

      ctx.lineWidth = 8;
      ctx.strokeStyle = "rgba(255,255,255,.18)";
      ctx.beginPath();
      ctx.arc(cx, cy, 55, start, end);
      ctx.stroke();

      ctx.strokeStyle = "#00eaff";
      ctx.beginPath();
      ctx.arc(cx, cy, 55, start, angle);
      ctx.stroke();

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);
      ctx.strokeStyle = "#ff3ee8";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(-8, 0);
      ctx.lineTo(48, 0);
      ctx.stroke();
      ctx.restore();

      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 30px Arial";
      ctx.textAlign = "center";
      ctx.fillText(speed, cx, cy + 15);

      ctx.fillStyle = "rgba(255,255,255,.75)";
      ctx.font = "12px Arial";
      ctx.fillText("KM/H", cx, cy + 36);

      ctx.fillStyle = "#00eaff";
      ctx.font = "bold 13px Arial";
      ctx.fillText(player.isDrifting ? "DRIFT" : "RACE", cx, cy - 35);
    }

    function drawLeaderboard() {
      const ranked = [...cars].sort((a, b) => (b.lap * 10 + b.progress) - (a.lap * 10 + a.progress));

      leaderboardEl.innerHTML = `<div class="boardTitle">POSITION</div>` + ranked.map((c, i) => {
        const cls = c.isPlayer ? "row me" : "row";
        return `<div class="${cls}"><span>${String(i + 1).padStart(2, "0")} ${c.emoji} ${c.name}</span><span>${c.aiMode}</span></div>`;
      }).join("");

      rankEl.textContent = ranked.findIndex(c => c === player) + 1;
    }

    function updateHUD() {
      lapEl.textContent = Math.min(player.lap, 3);
      speedEl.textContent = Math.round(Math.abs(player.speed) * 4.2);
      driftScoreEl.textContent = player.driftScore;
      nitroBar.style.width = `${Math.round(player.nitro * 100)}%`;

      const nearestAI = cars.slice(1).sort((a, b) =>
        Math.hypot(a.x - player.x, a.z - player.z) - Math.hypot(b.x - player.x, b.z - player.z)
      )[0];

      aiStateEl.textContent = nearestAI ? `${nearestAI.emoji} ${nearestAI.aiMode}` : "無";

      drawLeaderboard();
      drawMinimap();
      drawSpeedometer();
    }

    function updateCamera(dt) {
      const speed = Math.abs(player.speed);
      const f = getForward(player.angle);
      const r = getRight(player.angle);

      const back = 13 + clamp(speed / 84, 0, 1) * 6;
      const height = 5.2 + clamp(speed / 84, 0, 1) * 3.8;

      const cam = new THREE.Vector3(
        player.x - f.x * back + r.x * player.yawVel * 5,
        height,
        player.z - f.z * back + r.z * player.yawVel * 5
      );

      camera.position.lerp(cam, 1 - Math.pow(0.002, dt));
      camera.fov = lerp(camera.fov, 68 + clamp(speed / 84, 0, 1) * 10, dt * 2.5);
      camera.updateProjectionMatrix();
      camera.lookAt(player.x + f.x * 8, 1.9, player.z + f.z * 8);
    }

    function bindButton(button, key) {
      const set = v => {
        touchInput[key] = v;
        button.classList.toggle("active", v);
      };

      ["touchstart", "pointerdown"].forEach(type => {
        button.addEventListener(type, e => {
          e.preventDefault();
          set(true);
        }, { passive: false });
      });

      ["touchend", "touchcancel", "pointerup", "pointerleave"].forEach(type => {
        button.addEventListener(type, e => {
          e.preventDefault();
          set(false);
        }, { passive: false });
      });
    }

    function setupMobileControls() {
      bindButton(ui.gas, "gas");
      bindButton(ui.brake, "brake");
      bindButton(ui.nitro, "nitro");
      bindButton(ui.drift, "drift");

      let activePointer = null;

      const updateSteer = (clientX, clientY) => {
        const rect = ui.steerPad.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = clientX - cx;
        const dy = clientY - cy;
        const max = rect.width * 0.38;

        const nx = clamp(dx / max, -1, 1);
        const ny = clamp(dy / max, -1, 1);
        const len = Math.min(1, Math.hypot(nx, ny));
        const angle = Math.atan2(ny, nx);

        const kx = Math.cos(angle) * len * max;
        const ky = Math.sin(angle) * len * max;

        touchInput.steer = clamp(nx, -1, 1);
        ui.steerKnob.style.transform = `translate(${kx}px, ${ky}px)`;
      };

      const reset = () => {
        touchInput.steer = 0;
        ui.steerKnob.style.transform = "translate(0px, 0px)";
        activePointer = null;
      };

      ui.steerPad.addEventListener("pointerdown", e => {
        e.preventDefault();
        activePointer = e.pointerId;
        ui.steerPad.setPointerCapture(e.pointerId);
        updateSteer(e.clientX, e.clientY);
      });

      ui.steerPad.addEventListener("pointermove", e => {
        if (activePointer !== e.pointerId) return;
        e.preventDefault();
        updateSteer(e.clientX, e.clientY);
      });

      ui.steerPad.addEventListener("pointerup", e => {
        if (activePointer === e.pointerId) reset();
      });

      ui.steerPad.addEventListener("pointercancel", reset);

      document.addEventListener("touchmove", e => e.preventDefault(), { passive: false });
    }

    function resetGame() {
      const startPositions = [[0, -48], [-8, -49], [8, -49], [-16, -45], [16, -45], [0, -40]];

      cars.forEach((c, i) => {
        c.x = startPositions[i][0];
        c.z = startPositions[i][1];
        c.angle = Math.PI;
        c.speed = 0;
        c.sideSpeed = 0;
        c.yawVel = 0;
        c.lap = 1;
        c.cp = 0;
        c.progress = 0;
        c.nitro = 1;
        c.driftScore = 0;
        c.combo = 1;
        c.finished = false;
        c.aiMode = c.isPlayer ? "玩家" : "巡航";
        c.mesh.position.set(c.x, 0, c.z);
        c.mesh.rotation.y = c.angle;
      });
    }

    function finishRace() {
      running = false;
      startPanel.style.display = "flex";
      startPanel.querySelector("h1").textContent = "FINISH!";
      startPanel.querySelector("p").textContent = `完成比賽！漂移分數：${player.driftScore}`;
      startBtn.textContent = "重新開始";
    }

    function loop(t = 0) {
      const dt = Math.min((t - last) / 1000, 0.033);
      last = t;

      if (running) {
        updatePlayer(dt);
        cars.slice(1).forEach(c => updateAI(c, dt));

        if (player.finished) {
          finishRace();
        }
      }

      updateSmoke(dt);

      if (player) {
        updateCamera(dt);
        updateHUD();
      }

      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function init() {
      createWorld();

      cars = personalities.map((p, i) => createCar(p, i === 0));
      player = cars[0];

      resetGame();
      setupMobileControls();

      camera.position.set(0, 10, -24);
      camera.lookAt(0, 0, -40);

      startBtn.addEventListener("click", () => {
        resetGame();
        running = true;
        startPanel.style.display = "none";
      });

      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", e => {
      keys.add(e.code);

      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space", "ShiftLeft", "ShiftRight"].includes(e.code)) {
        e.preventDefault();
      }
    });

    window.addEventListener("keyup", e => keys.delete(e.code));

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.addEventListener("error", (e) => {
      const start = document.getElementById("start");
      if (!start) return;
      start.style.display = "flex";
      const p = start.querySelector("p");
      if (p) {
        p.innerHTML = "載入失敗。請確認有網路，因為這個單檔版本會從 CDN 載入 Three.js。<br>上傳到 GitHub Pages 後通常可以正常遊玩。";
      }
      console.error(e.message || e.error);
    });

    init();
  </script>
</body>
</html>
